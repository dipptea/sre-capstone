{{- if .Values.ingress.enabled }}
# Phase 02 Milestone 6 — Ingress consumed by the AWS Load Balancer Controller.
# The annotations below are the LBC's API: each one configures a piece of the
# ALB it provisions (scheme, target type, listeners, cert binding, health check).
# Spec reference: specs/phase-02.md §Implementation outline §6.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "payment.fullname" . }}
  labels:
    app: payment-service
    version: {{ .Chart.AppVersion | quote }}
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    alb.ingress.kubernetes.io/certificate-arn: {{ .Values.ingress.certificateArn | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: /health
spec:
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "payment.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
