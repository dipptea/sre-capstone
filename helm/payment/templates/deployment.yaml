apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "payment.fullname" . }}
  labels:
    app: payment-service
    version: {{ .Chart.AppVersion | quote }}
spec:
  # Phase 05 M4 finding: when HPA is enabled, omit `replicas:` from the manifest
  # entirely. HPA owns `.spec.replicas` via the scale subresource; if Helm also
  # tries to manage it, Kubernetes SSA detects the field-ownership conflict and
  # refuses to apply (manifests with: "conflict with kube-controller-manager
  # subresource scale"). Letting HPA be the sole writer eliminates the conflict.
  {{- if not .Values.hpa.enabled }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        version: {{ .Chart.AppVersion | quote }}
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: {{ include "payment.fullname" . }}
      # Phase 05 M1 — grace period must be >= preStopSleep + ~5s margin.
      # Default k8s value is 30s; named explicitly so future changes don't
      # silently shorten it and cut off the preStop hook.
      terminationGracePeriodSeconds: {{ .Values.gracefulShutdown.terminationGracePeriodSeconds }}
      containers:
      - name: payment
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        # Phase 05 M1 — preStop hook closes the graceful-shutdown gap.
        # sleep N keeps the pod alive after Service-endpoint removal so the
        # ALB has time to de-register the pod from its target group BEFORE
        # SIGTERM hits. Without this, kubelet sends SIGTERM immediately and
        # the ALB still routes to a dying pod for ~3-5s → 502s.
        lifecycle:
          preStop:
            exec:
              command: ["sh", "-c", "sleep {{ .Values.gracefulShutdown.preStopSleep }}"]
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        - name: DD_SERVICE
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment.fullname" . }}
              key: DD_SERVICE
        - name: DD_ENV
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment.fullname" . }}
              key: DD_ENV
        - name: DD_VERSION
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment.fullname" . }}
              key: DD_VERSION
        - name: DD_TRACE_ENABLED
          valueFrom:
            configMapKeyRef:
              name: {{ include "payment.fullname" . }}
              key: DD_TRACE_ENABLED
        - name: DD_AGENT_HOST
          value: "datadog.datadog.svc.cluster.local"
        - name: DD_TRACE_AGENT_PORT
          value: "8126"
        - name: DD_LOGS_INJECTION
          value: "true"
        # Probes — Phase 04 M2. Lifecycle order: startup gates → readiness +
        # liveness run concurrently after. No initialDelaySeconds on liveness;
        # startup probe is the boot-gate now. Per Decision 5 in spec.
        startupProbe:
          httpGet:
            path: {{ .Values.probes.startup.path }}
            port: http
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.probes.readiness.path }}
            port: http
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
        livenessProbe:
          httpGet:
            path: {{ .Values.probes.liveness.path }}
            port: http
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
        resources: {{ toYaml .Values.resources | nindent 10 }}
