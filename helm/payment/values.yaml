image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

replicas: 2  # Phase 04 M3 — bumped from 1 to match HPA minReplicas (avoids scale-down on first reconcile)

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

datadog:
  enabled: true
  agentHost: "datadog-agent.datadog.svc.cluster.local"
  service: "payment-service"
  env: "capstone"
  version: "0.1.0"
  traceEnabled: "true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Phase 04 M2 — three probes per Decision 5 in specs/phase-04.md.
# /health is a pure in-process check (audited 2026-05-08); liveness can be
# loose without amplifying downstream-slowness incidents.
probes:
  startup:
    path: /health
    periodSeconds: 5
    failureThreshold: 6      # 30s budget for boot (covers Python <5s with margin)
    timeoutSeconds: 1
  readiness:
    path: /health
    periodSeconds: 5         # fast removal from Service endpoints under failure
    failureThreshold: 3      # 15s before pod is removed from rotation
    timeoutSeconds: 2
  liveness:
    path: /health
    periodSeconds: 10
    failureThreshold: 6      # 60s before kill — looser than readiness on purpose
    timeoutSeconds: 2

# Phase 04 M3 — HPA per Decision 3 (min 2 / max 6) and Decision 2 (target 70% CPU).
# Gated by hpa.enabled so envs that don't want autoscaling can disable it.
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Phase 04 M4 — PodDisruptionBudget per Decision 4.
# minAvailable: 1 (integer) — keep at least 1 pod up during voluntary disruption
# (drain, eviction, cluster upgrade). Involuntary disruption (node hardware
# failure) ignores PDB by design — that's the lesson, not a bug.
pdb:
  enabled: true
  minAvailable: 1

# Phase 05 M1 — Graceful shutdown (close the Phase 04 M4b 502 gap).
# preStop sleep keeps the pod alive long enough for the ALB to de-register it
# from the target group BEFORE SIGTERM hits. Without this, kubelet sends
# SIGTERM immediately and the ALB still routes to a dying pod for ~3-5s → 502s.
# IMPORTANT: terminationGracePeriodSeconds MUST be >= preStopSleep + 5s margin,
# otherwise kubelet SIGKILLs the pod mid-sleep — worse than no preStop at all.
gracefulShutdown:
  preStopSleep: 10                        # 10s covers observed ALB de-reg with 2x margin
  terminationGracePeriodSeconds: 30       # 10s preStop + ~20s for app to drain in-flight requests

# Ingress (Phase 02). Enabled as chart default in Phase 04 M4b prep — see
# Decision log 2026-05-09. Previously enabled via `--set ingress.enabled=true`
# at install time and preserved across CI deploys via `--reuse-values`. When
# we removed `--reuse-values` in M2 to allow new values keys to load, the
# ingress quietly got disabled (chart default kicked back in) and the ALB was
# torn down. Hardcoding `enabled: true` and the cert ARN here makes the chart
# self-contained for this single-environment capstone.
ingress:
  enabled: true
  host: payment.payservice.click
  certificateArn: "arn:aws:acm:us-east-1:591316258137:certificate/a17fa89c-5e52-41df-ae72-c5d700b7c3dc"

