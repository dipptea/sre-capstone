image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

replicas: 1

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

datadog:
  enabled: true
  agentHost: "datadog-agent.datadog.svc.cluster.local"
  service: "payment-service"
  env: "capstone"
  version: "0.1.0"
  traceEnabled: "true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Phase 04 M2 — three probes per Decision 5 in specs/phase-04.md.
# /health is a pure in-process check (audited 2026-05-08); liveness can be
# loose without amplifying downstream-slowness incidents.
probes:
  startup:
    path: /health
    periodSeconds: 5
    failureThreshold: 6      # 30s budget for boot (covers Python <5s with margin)
    timeoutSeconds: 1
  readiness:
    path: /health
    periodSeconds: 5         # fast removal from Service endpoints under failure
    failureThreshold: 3      # 15s before pod is removed from rotation
    timeoutSeconds: 2
  liveness:
    path: /health
    periodSeconds: 10
    failureThreshold: 6      # 60s before kill — looser than readiness on purpose
    timeoutSeconds: 2

# Ingress (Phase 02). Disabled by default — opt in with --set ingress.enabled=true.
# When enabled, the AWS Load Balancer Controller provisions an internet-facing
# ALB and binds the ACM cert via the certificateArn below.
ingress:
  enabled: false
  host: payment.payservice.click
  # Pass at upgrade time, not committed to repo:
  #   --set ingress.certificateArn="$(cd ../infra && terraform output -raw acm_certificate_arn)"
  certificateArn: ""

