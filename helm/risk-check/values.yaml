image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

replicas: 2  # Phase 04 M5 — bumped from 1 to match HPA minReplicas (avoids scale-down on first reconcile)

service:
  port: 80
  targetPort: 8080
  type: ClusterIP

datadog:
  enabled: true
  agentHost: "datadog.datadog.svc.cluster.local"
  service: "risk-check-service"
  env: "capstone"
  version: "0.1.0"
  traceEnabled: "true"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Phase 04 M5 — three probes per Decision 5 in specs/phase-04.md.
# /health is a pure in-process check (audited 2026-05-09); liveness can be
# loose without amplifying upstream-cascade incidents.
probes:
  startup:
    path: /health
    periodSeconds: 5
    failureThreshold: 6      # 30s budget for boot
    timeoutSeconds: 1
  readiness:
    path: /health
    periodSeconds: 5         # fast removal from Service endpoints under failure
    failureThreshold: 3      # 15s before pod is removed from rotation
    timeoutSeconds: 2
  liveness:
    path: /health
    periodSeconds: 10
    failureThreshold: 6      # 60s before kill — looser than readiness on purpose
    timeoutSeconds: 2

# Phase 04 M5 — HPA per Decision 3 (min 2 / max 6) and Decision 2 (target 70% CPU).
# Symmetric with payment-service per the lockstep-scaling argument from Goal.
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

# Phase 04 M5 — PodDisruptionBudget per Decision 4.
# minAvailable: 1 (integer) — voluntary-disruption only.
pdb:
  enabled: true
  minAvailable: 1

# Phase 05 M1 — Graceful shutdown (mirrors payment-service per spec Decision 1+2).
# preStop sleep keeps the pod alive long enough for any caller (payment-service,
# in this case — risk-check is internal-only, no ALB) to notice the pod is gone
# before SIGTERM hits. terminationGracePeriodSeconds MUST be >= preStopSleep + 5s.
gracefulShutdown:
  preStopSleep: 15                        # bumped 10→15 (mirror payment M1 retry)
  terminationGracePeriodSeconds: 30
