apiVersion: v1
kind: Service
metadata:
  name: {{ include "risk-check-service.fullname" . }}
  labels:
    app: risk-check-service
    version: {{ .Chart.AppVersion | quote }}
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    app: risk-check-service
