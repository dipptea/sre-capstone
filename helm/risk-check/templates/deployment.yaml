apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "risk-check-service.fullname" . }}
  labels:
    app: risk-check-service
    version: {{ .Chart.AppVersion | quote }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: risk-check-service
  template:
    metadata:
      labels:
        app: risk-check-service
        version: {{ .Chart.AppVersion | quote }}
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: {{ include "risk-check-service.fullname" . }}
      containers:
      - name: risk-check
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        env:
        - name: DD_SERVICE
          valueFrom:
            configMapKeyRef:
              name: {{ include "risk-check-service.fullname" . }}
              key: DD_SERVICE
        - name: DD_ENV
          valueFrom:
            configMapKeyRef:
              name: {{ include "risk-check-service.fullname" . }}
              key: DD_ENV
        - name: DD_VERSION
          valueFrom:
            configMapKeyRef:
              name: {{ include "risk-check-service.fullname" . }}
              key: DD_VERSION
        - name: DD_TRACE_ENABLED
          valueFrom:
            configMapKeyRef:
              name: {{ include "risk-check-service.fullname" . }}
              key: DD_TRACE_ENABLED
        - name: DD_AGENT_HOST
          value: "datadog.datadog.svc.cluster.local"
        - name: DD_TRACE_AGENT_PORT
          value: "8126"
        - name: DD_LOGS_INJECTION
          value: "true"
        # Probes — Phase 04 M5. Lifecycle order: startup gates → readiness +
        # liveness run concurrently after. No initialDelaySeconds on liveness;
        # startup probe is the boot-gate now. Mirrors payment-service per Decision 5.
        startupProbe:
          httpGet:
            path: {{ .Values.probes.startup.path }}
            port: http
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
        readinessProbe:
          httpGet:
            path: {{ .Values.probes.readiness.path }}
            port: http
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
        livenessProbe:
          httpGet:
            path: {{ .Values.probes.liveness.path }}
            port: http
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
        resources: {{ toYaml .Values.resources | nindent 10 }}
